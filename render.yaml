# One-click deploy to Render (https://render.com). Gives your team a permanent HTTPS
# URL for Tower — no tunnels. Render reads this blueprint via the "Deploy to Render" button.
services:
  - type: web
    name: tower
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      # Render generates a strong secret; copy it from the dashboard and share with the team.
      - key: TOWER_TOKEN
        generateValue: true
    # NOTE: no disk — Render's free tier doesn't support them, so claims/decisions reset
    # when the service restarts (fine: claims expire in 15 min anyway). On a paid
    # instance, uncomment to persist decision history across restarts:
    # disk:
    #   name: tower-data
    #   mountPath: /app/.tower
    #   sizeGB: 1
