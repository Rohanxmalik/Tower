<svg xmlns="http://www.w3.org/2000/svg" width="840" height="368" viewBox="0 0 840 368" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <style>
    /* One 8s loop; each line reveals at its moment and everything resets cleanly.
       If a renderer ignores CSS animation, all lines default to opacity 1 (readable). */
    .l1 { animation: r1 8s infinite; }
    .l2 { animation: r2 8s infinite; }
    .l3 { animation: r3 8s infinite; }
    .l4 { animation: r4 8s infinite; transform-box: fill-box; transform-origin: left center; }
    .l5 { animation: r5 8s infinite; }
    .l6 { animation: r6 8s infinite; }
    @keyframes r1 { 0%,2%{opacity:0} 5%,94%{opacity:1} 100%{opacity:0} }
    @keyframes r2 { 0%,9%{opacity:0} 12%,94%{opacity:1} 100%{opacity:0} }
    @keyframes r3 { 0%,24%{opacity:0} 28%,94%{opacity:1} 100%{opacity:0} }
    @keyframes r4 { 0%,34%{opacity:0;transform:scale(.96)} 39%{opacity:1;transform:scale(1.03)} 42%,94%{opacity:1;transform:scale(1)} 100%{opacity:0} }
    @keyframes r5 { 0%,41%{opacity:0} 45%,94%{opacity:1} 100%{opacity:0} }
    @keyframes r6 { 0%,46%{opacity:0} 50%,94%{opacity:1} 100%{opacity:0} }
  </style>

  <rect width="840" height="368" rx="10" fill="#0d1117"/>
  <rect width="840" height="36" rx="10" fill="#161b22"/>
  <rect y="26" width="840" height="10" fill="#161b22"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="18" r="6" fill="#27c93f"/>
  <text x="420" y="22" fill="#8b949e" font-size="13" text-anchor="middle">tower — air-traffic control for AI agents</text>

  <g font-size="15">
    <text class="l1" x="24" y="78" xml:space="preserve"><tspan fill="#3fb950">$ </tspan><tspan fill="#c9d1d9">tower claim --agent cursor-bob --symbol src/auth.ts#AuthService.verify</tspan></text>
    <text class="l2" x="24" y="104" fill="#56d364">✅ No collisions — safe to proceed.</text>

    <text class="l3" x="24" y="150" xml:space="preserve"><tspan fill="#3fb950">$ </tspan><tspan fill="#c9d1d9">tower claim --agent claude-a --symbol src/auth.ts#AuthService.verify</tspan></text>
    <text class="l4" x="24" y="182" fill="#f85149" font-weight="bold">⛔ COLLISION — AuthService.verify</text>
    <text class="l5" x="24" y="208" fill="#8b949e">   Agent "cursor-bob" is mid-change (started 2m ago, ETA ~6m, purpose: replace JWT).</text>
    <text class="l6" x="24" y="234" fill="#6e7681">   Options:  [w] wait   [d] take dependent task   [b] branch from their WIP   [f] force</text>
  </g>

  <text x="24" y="304" fill="#c9d1d9" font-size="14">Caught <tspan fill="#58a6ff">before the first keystroke</tspan> — not at merge time.</text>
  <text x="24" y="330" fill="#484f58" font-size="12.5">Semantic (tree-sitter) symbol overlap · model-agnostic over MCP · Claude Code, Cursor, Codex</text>
</svg>
